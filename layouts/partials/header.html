<header class="site-header">
  <div class="container header-inner">
    <a href="{{ .Site.Home.RelPermalink }}" class="site-logo" aria-label="Home">
      {{ $logo := resources.Get "images/logo.png" }}
      {{ with $logo }}
        {{ $resized := .Fit "240x48" }}
        <img src="{{ $resized.RelPermalink }}" alt="Sander Veen Art — Sinds 1980" class="logo-img" width="{{ $resized.Width }}" height="{{ $resized.Height }}">
      {{ end }}
    </a>

    <nav class="main-nav" id="main-nav" aria-label="{{ i18n "main_navigation" }}">
      <ul class="nav-list">
        {{ range .Site.Menus.main }}
          <li class="nav-item">
            <a href="{{ with .Page }}{{ .RelPermalink }}{{ else }}{{ .URL }}{{ end }}" class="nav-link{{ if and .Page (hasPrefix $.RelPermalink .Page.RelPermalink) }} is-active{{ end }}">
              {{ .Name }}
            </a>
          </li>
        {{ end }}
      </ul>
    </nav>

    <div class="header-actions">
      {{- partial "language-switcher.html" . -}}

      <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark/light theme" title="Toggle dark/light theme">
        🌙
      </button>

      <button class="menu-toggle" id="menu-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="{{ i18n "menu_open" }}">
        <span class="hamburger"></span>
      </button>
    </div>
  </div>
</header>
