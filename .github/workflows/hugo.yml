name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.0
    steps:
      - name: Install Hugo CLI
        run: |
          set -euo pipefail
          HUGO_DEB="hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          BASE="https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}"
          cd "${{ runner.temp }}"
          # curl -fL fails on HTTP errors (4xx/5xx) so the step fails closed
          # rather than continuing with a partial or 404'd file.
          curl -fLO "${BASE}/${HUGO_DEB}"
          curl -fLO "${BASE}/hugo_${HUGO_VERSION}_checksums.txt"
          # Require the .deb's line to be present and pass; --ignore-missing
          # alone would silently pass if the entry were absent.
          grep -F "${HUGO_DEB}" "hugo_${HUGO_VERSION}_checksums.txt" \
            | sha256sum --check --strict
          sudo dpkg -i "${HUGO_DEB}"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Validate content
        run: python scripts/validate_content.py

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build with Hugo
        env:
          HUGO_CACHEDIR: ${{ runner.temp }}/hugo_cache
          HUGO_ENVIRONMENT: production
          TZ: Europe/Amsterdam
        run: |
          hugo \
            --minify \
            --baseURL "${{ steps.pages.outputs.base_url }}/"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
