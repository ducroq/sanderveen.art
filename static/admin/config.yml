backend:
  name: github
  repo: ducroq/sanderveen.art
  branch: main

media_folder: assets/images/paintings
public_folder: images/paintings

locale: nl

slug:
  encoding: ascii
  clean_accents: true

collections:
  # --- Dutch paintings ---
  - name: schilderijen
    label: Schilderijen (NL)
    folder: content/schilderijen
    create: true
    slug: "{{slug}}"
    summary: "{{fields.title}} — {{fields.status}}"
    filter: { field: translationKey, pattern: ".+" }
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Datum, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - label: Vertaalsleutel
        name: translationKey
        widget: string
        hint: "Kleine letters met streepjes, bijv. 'mijn-schilderij'. LET OP: na Publish moet je ook een Engelse versie aanmaken via Paintings (EN) met EXACT dezelfde sleutel — anders werkt de taalwissel niet."
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Alleen kleine letters, cijfers en streepjes. Geen spaties of hoofdletters."]
      - { label: Type, name: type, widget: hidden, default: schilderijen }
      - label: Techniek
        name: medium
        widget: string
        hint: "Bijv. Olieverf op doek, Acryl op paneel"
      - label: Afmetingen
        name: dimensions
        widget: string
        hint: "Bijv. 80 x 60 cm — vergeet 'cm' niet!"
        pattern: ['^\d+[\d,.]?\d*\s*x\s*\d+[\d,.]?\d*\s*cm$', "Formaat: 'N x N cm'. Bijv. 80 x 60 cm of 80 x 47,5 cm. Vergeet 'cm' niet."]
      - { label: Jaar, name: year, widget: string, required: false }
      - label: Status
        name: status
        widget: select
        options:
          - { label: "Te koop", value: available }
          - { label: "Verkocht", value: sold }
          - { label: "Niet te koop", value: not-for-sale }
        default: available
      - { label: Uitgelicht, name: featured, widget: boolean, default: false }
      - label: Afbeelding
        name: image
        widget: image
        hint: "Hernoem het bestand VOOR upload: kleine letters, streepjes, geen spaties. Bijv. 'mijn-schilderij.jpg'"
        pattern: ['^/?images/paintings/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Bestandsnaam moet alleen kleine letters, cijfers en streepjes bevatten (geen spaties, geen hoofdletters). Bijv. 'mijn-schilderij.jpg'. Hernoem het bestand op je computer en upload opnieuw."]
      - label: Categorie
        name: category
        widget: select
        options: ["Abstract", "Surrealistisch"]
        hint: "Kies dezelfde categorie bij de Engelse versie. Let op: 'Surrealistisch' (NL) heet 'Surrealist' in de EN versie."
      - { label: Beschrijving, name: body, widget: markdown, required: false }

  # --- English paintings ---
  - name: paintings-en
    label: Paintings (EN)
    folder: content/en/paintings
    create: true
    slug: "{{slug}}"
    summary: "{{fields.title}} — {{fields.status}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Draft, name: draft, widget: boolean, default: false }
      - label: Translation key
        name: translationKey
        widget: string
        hint: "Lowercase with hyphens, e.g. 'my-painting'. IMPORTANT: must EXACTLY match the translationKey on the Dutch version under Schilderijen (NL) — otherwise the language switcher will not link them."
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Only lowercase letters, numbers and hyphens. No spaces or capitals."]
      - { label: Type, name: type, widget: hidden, default: schilderijen }
      - { label: Medium, name: medium, widget: string }
      - label: Dimensions
        name: dimensions
        widget: string
        hint: "E.g. 80 x 60 cm — don't forget 'cm'!"
        pattern: ['^\d+[\d,.]?\d*\s*x\s*\d+[\d,.]?\d*\s*cm$', "Format: 'N x N cm'. E.g. 80 x 60 cm or 80 x 47,5 cm. Don't forget 'cm'."]
      - { label: Year, name: year, widget: string, required: false }
      - label: Status
        name: status
        widget: select
        options:
          - { label: "Available", value: available }
          - { label: "Sold", value: sold }
          - { label: "Not for sale", value: not-for-sale }
        default: available
      - { label: Featured, name: featured, widget: boolean, default: false }
      - label: Image
        name: image
        widget: image
        hint: "Rename file BEFORE upload: lowercase, hyphens, no spaces. E.g. 'my-painting.jpg'"
        pattern: ['^/?images/paintings/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Filename must use only lowercase letters, digits and hyphens (no spaces, no capitals). E.g. 'my-painting.jpg'. Rename the file on your computer and upload again."]
      - label: Category
        name: category
        widget: select
        options: ["Abstract", "Surrealist"]
        hint: "Kies hetzelfde als de NL versie. NL 'Surrealistisch' = EN 'Surrealist'. (Pick same as NL — Surrealistisch maps to Surrealist.)"
      - { label: Description, name: body, widget: markdown, required: false }

  # --- Workshops (NL) ---
  - name: workshops
    label: Workshops (NL)
    folder: content/workshops
    create: true
    slug: "{{slug}}"
    filter: { field: translationKey, pattern: ".+" }
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschrijving (kort), name: description, widget: string }
      - label: Vertaalsleutel
        name: translationKey
        widget: string
        hint: "Kleine letters met streepjes, bijv. 'workshop-abstract'. Moet gelijk zijn aan de EN versie!"
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Alleen kleine letters, cijfers en streepjes."]
      - { label: Type, name: type, widget: hidden, default: workshops }
      - { label: Datum/tijd, name: workshop_date, widget: string, hint: "Bijv. Zaterdagen 10:00-12:00" }
      - { label: Locatie, name: location, widget: string, default: "Atelier Sander Veen, Eenvoudlaan 6A, Veenendaal" }
      - { label: Prijs, name: price, widget: string, default: "40 per les" }
      - { label: Volgorde, name: weight, widget: number, default: 50, hint: "Lager nummer = hoger in de lijst. Standaard 50." }
      - { label: Inhoud, name: body, widget: markdown }

  # --- Workshops (EN) ---
  - name: workshops-en
    label: Workshops (EN)
    folder: content/en/workshops
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description (short), name: description, widget: string }
      - label: Translation key
        name: translationKey
        widget: string
        hint: "Lowercase with hyphens. Must match the NL version!"
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Only lowercase letters, numbers and hyphens."]
      - { label: Type, name: type, widget: hidden, default: workshops }
      - { label: Date/time, name: workshop_date, widget: string, hint: "E.g. Saturdays 10:00–12:00" }
      - { label: Location, name: location, widget: string, default: "Studio Sander Veen, Eenvoudlaan 6A, Veenendaal" }
      - { label: Price, name: price, widget: string, default: "40 per lesson" }
      - { label: Order, name: weight, widget: number, default: 50, hint: "Lower number = higher in the list. Default 50." }
      - { label: Content, name: body, widget: markdown }

  # --- Exposities (NL) ---
  - name: exposities
    label: Exposities (NL)
    folder: content/exposities
    media_folder: "/assets/images/exhibitions"
    public_folder: "images/exhibitions"
    create: true
    slug: "{{slug}}"
    filter: { field: translationKey, pattern: ".+" }
    fields:
      - { label: Titel, name: title, widget: string }
      - { label: Beschrijving (kort), name: description, widget: string }
      - label: Vertaalsleutel
        name: translationKey
        widget: string
        hint: "Kleine letters met streepjes, bijv. 'expo-naam-2025'. Moet gelijk zijn aan de EN versie!"
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Alleen kleine letters, cijfers en streepjes."]
      - { label: Type, name: type, widget: hidden, default: exposities }
      - { label: Datum, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Begindatum, name: start_date, widget: string }
      - { label: Einddatum, name: end_date, widget: string }
      - { label: Locatie, name: location, widget: string }
      - label: Hoofdafbeelding
        name: image
        widget: image
        hint: "Hernoem het bestand VOOR upload: kleine letters, streepjes, geen spaties. Bijv. 'expo-2025-1.jpg'."
        pattern: ['^/?images/exhibitions/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Bestandsnaam moet alleen kleine letters, cijfers en streepjes bevatten (geen spaties, geen hoofdletters). Hernoem het bestand op je computer en upload opnieuw."]
      - label: Galerijtje
        name: gallery
        widget: list
        field:
          label: Foto
          name: photo
          widget: image
          pattern: ['^/?images/exhibitions/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Bestandsnaam moet alleen kleine letters, cijfers en streepjes bevatten. Hernoem en upload opnieuw."]
        required: false
      - label: Video's
        name: videos
        widget: list
        required: false
        hint: "Optioneel. Korte sfeerimpressies (mp4). Tip: stuur via WhatsApp naar jezelf om te verkleinen. Klik op 'Add' per video."
        field:
          label: Video
          name: video
          widget: file
          media_folder: "/static/videos"
          public_folder: "videos"
          pattern: ['^/?videos/[a-z0-9][a-z0-9-]*\.mp4$', "Bestandsnaam mag alleen kleine letters (a-z), cijfers en streepjes (-) bevatten en moet eindigen op .mp4. Geen hoofdletters, geen underscores (_), geen spaties. Hernoem het bestand op je computer en upload opnieuw."]
      - { label: Volgorde, name: weight, widget: number, default: 50, hint: "Lager nummer = hoger in de lijst. Standaard 50." }
      - { label: Inhoud, name: body, widget: markdown }

  # --- Exhibitions (EN) ---
  - name: exhibitions-en
    label: Exhibitions (EN)
    folder: content/en/exhibitions
    media_folder: "/assets/images/exhibitions"
    public_folder: "images/exhibitions"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Description (short), name: description, widget: string }
      - label: Translation key
        name: translationKey
        widget: string
        hint: "Lowercase with hyphens. Must match the NL version!"
        pattern: ['^[a-z0-9][a-z0-9-]+$', "Only lowercase letters, numbers and hyphens."]
      - { label: Type, name: type, widget: hidden, default: exposities }
      - { label: Date, name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: Start date, name: start_date, widget: string }
      - { label: End date, name: end_date, widget: string }
      - { label: Location, name: location, widget: string }
      - label: Main image
        name: image
        widget: image
        hint: "Rename file BEFORE upload: lowercase, hyphens, no spaces. E.g. 'expo-2025-1.jpg'."
        pattern: ['^/?images/exhibitions/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Filename must use only lowercase letters, digits and hyphens (no spaces, no capitals). Rename the file on your computer and upload again."]
      - label: Gallery
        name: gallery
        widget: list
        field:
          label: Photo
          name: photo
          widget: image
          pattern: ['^/?images/exhibitions/[a-z0-9][a-z0-9-]*\.(jpe?g|png|webp)$', "Filename must use only lowercase letters, digits and hyphens. Rename and upload again."]
        required: false
      - label: Videos
        name: videos
        widget: list
        required: false
        hint: "Optional. Short clips (mp4). Tip: send via WhatsApp to yourself to shrink the file. Click 'Add' per video."
        field:
          label: Video
          name: video
          widget: file
          media_folder: "/static/videos"
          public_folder: "videos"
          pattern: ['^/?videos/[a-z0-9][a-z0-9-]*\.mp4$', "Filename may only contain lowercase letters (a-z), digits and hyphens (-) and must end in .mp4. No uppercase, no underscores (_), no spaces. Rename the file on your computer and upload again."]
      - { label: Order, name: weight, widget: number, default: 50, hint: "Lower number = higher in the list. Default 50." }
      - { label: Content, name: body, widget: markdown }

  # --- About (NL) ---
  - name: over
    label: Over mij (NL)
    files:
      - name: over
        label: Over mij
        file: content/over/_index.md
        fields:
          - { label: Titel, name: title, widget: string }
          - { label: Beschrijving, name: description, widget: string }
          - { label: Vertaalsleutel, name: translationKey, widget: hidden, default: about }
          - label: Atelier video
            name: video
            widget: file
            required: false
            media_folder: "/static/videos"
            public_folder: "videos"
            hint: "Optioneel. Houd 'm onder de 20 MB. Tip: stuur de video via WhatsApp naar jezelf — wat je terugkrijgt is al flink verkleind. Hernoem het bestand VOOR upload: kleine letters, streepjes, geen spaties, eindigt op .mp4."
            pattern: ['^/?videos/[a-z0-9][a-z0-9-]*\.mp4$', "Bestandsnaam mag alleen kleine letters (a-z), cijfers en streepjes (-) bevatten en moet eindigen op .mp4. Geen hoofdletters, geen underscores (_), geen spaties. Bijv. 'atelier-rondleiding.mp4'. Hernoem het bestand op je computer en upload opnieuw."]
          - { label: Inhoud, name: body, widget: markdown }

  # --- About (EN) ---
  - name: about-en
    label: About (EN)
    files:
      - name: about
        label: About
        file: content/en/about/_index.md
        fields:
          - { label: Title, name: title, widget: string }
          - { label: Description, name: description, widget: string }
          - { label: Translation key, name: translationKey, widget: hidden, default: about }
          - label: Studio video
            name: video
            widget: file
            required: false
            media_folder: "/static/videos"
            public_folder: "videos"
            hint: "Optional. Keep it under 20 MB. Tip: send the video to yourself via WhatsApp — what you receive back is already much smaller. Rename file BEFORE upload: lowercase, hyphens, no spaces, ending in .mp4."
            pattern: ['^/?videos/[a-z0-9][a-z0-9-]*\.mp4$', "Filename may only contain lowercase letters (a-z), digits and hyphens (-) and must end in .mp4. No uppercase, no underscores (_), no spaces. E.g. 'studio-tour.mp4'. Rename the file on your computer and upload again."]
          - { label: Content, name: body, widget: markdown }
